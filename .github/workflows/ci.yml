name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --directory backend
      - run: bash scripts/lint.sh

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --directory backend
      - run: bash scripts/audit.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --directory backend
      - run: uv run --directory backend pytest tests/ -v

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci && npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t public-data-analysis .

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [docker]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/docker-login@v2
        with:
          login-server: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - run: docker build -t ${{ vars.ACR_LOGIN_SERVER }}/public-data-analysis:${{ github.sha }} -t ${{ vars.ACR_LOGIN_SERVER }}/public-data-analysis:latest .
      - run: docker push ${{ vars.ACR_LOGIN_SERVER }}/public-data-analysis --all-tags
      - run: >
          az containerapp update
          --name ${{ vars.CONTAINER_APP_NAME }}
          --resource-group ${{ vars.RESOURCE_GROUP }}
          --image ${{ vars.ACR_LOGIN_SERVER }}/public-data-analysis:${{ github.sha }}
